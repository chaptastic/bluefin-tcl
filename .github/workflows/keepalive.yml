name: keepalive
# GitHub auto-disables scheduled workflows after 60 days of repository
# inactivity. This job keeps the repo "active" so the daily bluebuild
# schedule never gets switched off during quiet stretches.
on:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  workflow_dispatch: # allow manually triggering

jobs:
  keepalive:
    name: Keep repository active
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Push a keepalive commit when nearing inactivity
        run: |
          # Only commit once the latest commit is old enough that we're
          # approaching the 60-day cutoff. Keeps history noise to a minimum.
          age_days=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          echo "Latest commit is ${age_days} days old."
          if [ "$age_days" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive to prevent workflow auto-disable"
            git push
          else
            echo "Repo is active enough; no keepalive commit needed."
          fi
